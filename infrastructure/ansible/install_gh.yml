---
- name: Install GitHub CLI and authenticate
  hosts: vm
  become: yes
  vars:
    github_token: "{{ lookup('env', 'GITHUB_TOKEN') }}"

  tasks:
    - name: Install GitHub CLI
      apt:
        name: gh
        state: present
        update_cache: yes

    - name: Check if GITHUB_TOKEN environment variable is set
      debug:
        msg: "GitHub token is {{ 'set' if github_token else 'NOT set' }}"

    - name: Read GitHub token from .env file if env var not set
      shell: grep GITHUB_TOKEN .env | cut -d '=' -f2
      register: github_token_from_file
      changed_when: false
      no_log: true
      when: github_token == ""
      failed_when: false

    - name: Set github_token from file if needed
      set_fact:
        github_token: "{{ github_token_from_file.stdout }}"
      when: github_token == "" and github_token_from_file.stdout is defined
      no_log: true

    - name: Fail if no token available
      fail:
        msg: "GITHUB_TOKEN not found in environment or .env file"
      when: github_token == "" or github_token is not defined

    - name: Authenticate GitHub CLI using token
      shell: echo "{{ github_token }}" | gh auth login --with-token
      no_log: true
      become: no
      when: github_token is defined and github_token != ""

    - name: Verify GitHub CLI login
      command: gh auth status
      register: gh_status
      changed_when: false
      become: no
      failed_when: false

    - name: Display GH CLI status
      debug:
        msg: "{{ gh_status.stdout }}"
