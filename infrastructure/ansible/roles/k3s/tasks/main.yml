---
- name: Check if k3s is already installed
  stat:
    path: "{{ k3s_install_dir }}/k3s"
  register: k3s_binary

- name: Download k3s installation script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'
  when: not k3s_binary.stat.exists

- name: Install k3s
  shell: |
    {% if k3s_version != "latest" %}
    INSTALL_K3S_VERSION="{{ k3s_version }}" sh /tmp/k3s-install.sh {{ k3s_server_options }}
    {% else %}
    sh /tmp/k3s-install.sh {{ k3s_server_options }}
    {% endif %}
    {% if k3s_disable_components | length > 0 %}
    --disable {{ k3s_disable_components | join(',') }}
    {% endif %}
  args:
    creates: "{{ k3s_install_dir }}/k3s"
  environment:
    K3S_KUBECONFIG_MODE: "644"
  when: not k3s_binary.stat.exists

- name: Wait for k3s to be ready
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 60
  when: not k3s_binary.stat.exists

- name: Ensure k3s service is started and enabled
  systemd:
    name: k3s
    state: started
    enabled: yes

- name: Create .kube directory for ansible user
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Copy kubeconfig to user's home directory
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
    remote_src: yes

- name: Install kubectl
  get_url:
    url: "https://dl.k8s.io/release/{{ k3s_version.split('+')[0] }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'

- name: Verify k3s installation
  command: k3s kubectl get nodes
  register: k3s_nodes
  changed_when: false

- name: Display k3s cluster info
  debug:
    msg: "K3s is installed and running. Nodes: {{ k3s_nodes.stdout }}"
