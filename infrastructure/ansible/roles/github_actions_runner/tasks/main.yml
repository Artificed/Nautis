---
- name: Create actions-runner directory
  file:
    path: "{{ runner_directory }}"
    state: directory
    owner: "{{ runner_user }}"
    group: "{{ runner_user }}"
    mode: "0755"

- name: Download GitHub Actions runner package
  get_url:
    url: "{{ runner_download_url }}"
    dest: "{{ runner_directory }}/actions-runner-{{ runner_arch }}-{{ runner_version }}.tar.gz"
    checksum: "{{ runner_checksum }}"
    owner: "{{ runner_user }}"
    group: "{{ runner_user }}"
    mode: "0644"

- name: Extract runner package
  unarchive:
    src: "{{ runner_directory }}/actions-runner-{{ runner_arch }}-{{ runner_version }}.tar.gz"
    dest: "{{ runner_directory }}"
    remote_src: yes
    owner: "{{ runner_user }}"
    group: "{{ runner_user }}"
    creates: "{{ runner_directory }}/config.sh"

- name: Check if runner is already configured
  stat:
    path: "{{ runner_directory }}/.runner"
  register: runner_configured

- name: Configure GitHub Actions runner
  shell: |
    ./config.sh --url {{ runner_repo_url }} --token {{ runner_token }} \
      --unattended --replace --name $(hostname) --work _work
  args:
    chdir: "{{ runner_directory }}"
  become_user: "{{ runner_user }}"
  when:
    - not runner_configured.stat.exists
    - runner_token is defined
    - runner_token != ""

- name: Install runner as a service
  shell: |
    sudo ./svc.sh install
    sudo ./svc.sh start
  args:
    chdir: "{{ runner_directory }}"
  when:
    - runner_token is defined
    - runner_token != ""

- name: Display runner setup status
  debug:
    msg: "GitHub Actions runner downloaded and extracted to {{ runner_directory }}"

- name: Show next steps if token not provided
  debug:
    msg:
      - "Runner is ready for configuration!"
      - "To configure manually, run:"
      - "cd {{ runner_directory }}"
      - "./config.sh --url {{ runner_repo_url }} --token YOUR_TOKEN"
      - "./run.sh"
      - ""
      - "Or set RUNNER_TOKEN environment variable and re-run playbook to auto-configure"
  when: runner_token is not defined or runner_token == ""

- name: Show configuration status
  debug:
    msg: "Runner configured and started as a service!"
  when:
    - runner_token is defined
    - runner_token != ""
