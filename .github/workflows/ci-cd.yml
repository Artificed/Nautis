name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_APP: ghcr.io/artificed/astdev-presentation/presentation-application
  IMAGE_NAME_MCP: ghcr.io/artificed/astdev-presentation/cluster-mcp
  APPLICATION_DIR: ./application
  MCP_DIR: ./cluster-mcp
  K8S_NAMESPACE: astdev-presentation
  K8S_NAMESPACE_MCP: cluster-mcp
  DEPLOYMENT_NAME: presentation-application

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: application/package-lock.json
    
    - name: Install & Test
      working-directory: ${{ env.APPLICATION_DIR }}
      run: |
        npm ci
        npm test
        npm run build

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (Application)
      id: meta-app
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME_APP }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build & Push Application
      uses: docker/build-push-action@v5
      with:
        context: ${{ env.APPLICATION_DIR }}
        push: true
        tags: ${{ steps.meta-app.outputs.tags }}
        labels: ${{ steps.meta-app.outputs.labels }}

    - name: Extract metadata (MCP)
      id: meta-mcp
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME_MCP }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build & Push Cluster MCP
      uses: docker/build-push-action@v5
      with:
        context: ${{ env.MCP_DIR }}
        push: true
        tags: ${{ steps.meta-mcp.outputs.tags }}
        labels: ${{ steps.meta-mcp.outputs.labels }}

  deploy:
    name: Deploy to VM
    runs-on: self-hosted
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Apply Namespaces
      run: |
        sudo k3s kubectl apply -f k8s/application/namespace.yaml
        sudo k3s kubectl apply -f k8s/cluster-mcp/namespace.yaml

    - name: Configure Registry Secrets
      run: |
        sudo k3s kubectl create secret docker-registry ghcr-secret \
          --docker-server=ghcr.io \
          --docker-username=${{ github.actor }} \
          --docker-password=${{ secrets.GITHUB_TOKEN }} \
          --docker-email=${{ github.actor }}@users.noreply.github.com \
          --namespace=${{ env.K8S_NAMESPACE }} \
          --dry-run=client -o yaml | sudo k3s kubectl apply -f -
        
        sudo k3s kubectl create secret docker-registry ghcr-secret \
          --docker-server=ghcr.io \
          --docker-username=${{ github.actor }} \
          --docker-password=${{ secrets.GITHUB_TOKEN }} \
          --docker-email=${{ github.actor }}@users.noreply.github.com \
          --namespace=${{ env.K8S_NAMESPACE_MCP }} \
          --dry-run=client -o yaml | sudo k3s kubectl apply -f -
    
    - name: Apply Application Manifests
      run: |
        sudo k3s kubectl apply -f k8s/application/deployment.yaml
        sudo k3s kubectl apply -f k8s/application/service.yaml
        sudo k3s kubectl apply -f k8s/application/ingress.yaml
    
    - name: Apply Cluster MCP Manifests
      run: |
        sudo k3s kubectl apply -f k8s/cluster-mcp/rbac.yaml
        sudo k3s kubectl apply -f k8s/cluster-mcp/deployment.yaml
        sudo k3s kubectl apply -f k8s/cluster-mcp/service.yaml
        sudo k3s kubectl apply -f k8s/cluster-mcp/middleware.yaml
        sudo k3s kubectl apply -f k8s/cluster-mcp/ingress.yaml
    
    - name: Rollout & Verify Application
      run: |
        sudo k3s kubectl rollout restart deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.K8S_NAMESPACE }}
        sudo k3s kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.K8S_NAMESPACE }} --timeout=300s
        
        echo "Application Deployment Status:"
        sudo k3s kubectl get pods -n ${{ env.K8S_NAMESPACE }}
        sudo k3s kubectl get svc -n ${{ env.K8S_NAMESPACE }}
        
        echo "Application Pod Details:"
        sudo k3s kubectl describe pods -n ${{ env.K8S_NAMESPACE }} -l app=presentation-application | tail -50
        
        echo "Health Check:"
        curl -f http://localhost:80 || echo "⚠️  Warning: Health check failed"
    
    - name: Rollout & Verify Cluster MCP
      run: |
        sudo k3s kubectl rollout restart deployment/cluster-mcp -n ${{ env.K8S_NAMESPACE_MCP }}
        sudo k3s kubectl rollout status deployment/cluster-mcp -n ${{ env.K8S_NAMESPACE_MCP }} --timeout=300s
        
        echo "Cluster MCP Deployment Status:"
        sudo k3s kubectl get pods -n ${{ env.K8S_NAMESPACE_MCP }}
        sudo k3s kubectl get svc -n ${{ env.K8S_NAMESPACE_MCP }}
        sudo k3s kubectl get ingress -n ${{ env.K8S_NAMESPACE_MCP }}
        
        echo "Cluster MCP Pod Details:"
        sudo k3s kubectl describe pods -n ${{ env.K8S_NAMESPACE_MCP }} -l app=cluster-mcp | tail -50
        
        echo "Test Cluster MCP Health:"
        sleep 10  # Wait for pods to be ready
        POD_NAME=$(sudo k3s kubectl get pod -n ${{ env.K8S_NAMESPACE_MCP }} -l app=cluster-mcp -o jsonpath='{.items[0].metadata.name}')
        sudo k3s kubectl exec -n ${{ env.K8S_NAMESPACE_MCP }} $POD_NAME -- curl -f http://localhost:8080/cluster-mcp/health && echo "Cluster MCP is healthy!" || echo "Warning: Health check failed"
        
        echo "Test MCP Server Access to Cluster:"
        sudo k3s kubectl exec -n ${{ env.K8S_NAMESPACE_MCP }} $POD_NAME -- python -c "from kubernetes import client, config; config.load_incluster_config(); v1 = client.CoreV1Api(); print(f'MCP can access cluster! Found {len(v1.list_namespace().items)} namespaces')" || echo "Warning: MCP access test failed"
        
        echo "Test External MCP Access:"
        curl -f http://localhost/cluster-mcp/health && echo "Cluster MCP is accessible externally!" || echo "Warning: External access test failed