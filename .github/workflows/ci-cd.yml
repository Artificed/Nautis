name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
      working-directory: ./frontend
    
    - name: Run linter
      run: npm run lint
      working-directory: ./frontend
    
    - name: Run tests
      run: npm test
      working-directory: ./frontend
    
    - name: Build application
      run: npm run build
      working-directory: ./frontend

  deploy:
    runs-on: self-hosted
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        docker build -t presentation-frontend:latest ./frontend
    
    - name: Import image to k3s
      run: |
        docker save presentation-frontend:latest | sudo k3s ctr images import -
    
    - name: Deploy to k3s
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
    
    - name: Restart deployment 
      run: |
        kubectl rollout restart deployment/presentation-frontend -n astdev-presentation
        kubectl rollout status deployment/presentation-frontend -n astdev-presentation --timeout=60s
    
    - name: Verify deployment
      run: |
        echo "Checking deployment status"
        kubectl get pods -n astdev-presentation
        kubectl get svc -n astdev-presentation
    
    - name: Health check
      run: |
        echo "Checking if application is running"
        curl -f http://localhost:30080 || echo "Warning: Health check failed"
