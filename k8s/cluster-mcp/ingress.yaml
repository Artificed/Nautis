apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cluster-mcp
  namespace: cluster-mcp
  labels:
    app: cluster-mcp
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.priority: "10"
    traefik.ingress.kubernetes.io/router.middlewares: "cluster-mcp-mcp-headers@kubernetescrd"
spec:
  rules:
  - http:
      paths:
      - path: /cluster-mcp
        pathType: Prefix
        backend:
          service:
            name: cluster-mcp
            port:
              number: 8080