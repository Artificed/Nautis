---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-mcp
  namespace: cluster-mcp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-mcp-reader
rules:
- apiGroups: [""]
  resources: ["pods", "services", "namespaces", "nodes", "pods/log"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-mcp-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-mcp-reader
subjects:
- kind: ServiceAccount
  name: cluster-mcp
  namespace: cluster-mcp

