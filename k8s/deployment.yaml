apiVersion: apps/v1
kind: Deployment
metadata:
  name: presentation-frontend
  namespace: astdev-presentation
  labels:
    app: presentation-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: presentation-frontend
  template:
    metadata:
      labels:
        app: presentation-frontend
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: frontend
        image: ghcr.io/artificed/astdev-presentation/presentation-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
