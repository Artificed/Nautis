apiVersion: apps/v1
kind: Deployment
metadata:
  name: automation-server
  namespace: automation-server
  labels:
    app: automation-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: automation-server
  template:
    metadata:
      labels:
        app: automation-server
    spec:
      serviceAccountName: automation-server
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: automation-server
        image: ghcr.io/artificed/astdev-presentation/automation-server:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
