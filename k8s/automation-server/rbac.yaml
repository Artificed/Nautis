apiVersion: v1
kind: ServiceAccount
metadata:
  name: automation-server
  namespace: automation-server
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: automation-server-reader
rules:
- apiGroups: [""]
  resources:
    - namespaces
    - nodes
    - pods
    - pods/log
    - services
    - events
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
    - statefulsets
    - daemonsets
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
    - networkpolicies
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: automation-server-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: automation-server-reader
subjects:
- kind: ServiceAccount
  name: automation-server
  namespace: automation-server
